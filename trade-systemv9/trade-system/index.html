<script type="text/babel">
const { useState, useMemo, useRef, useEffect, useCallback } = React;

  ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

// ── CONSTANTS ──
const uid  = () => Math.random().toString(36).slice(2);
const fmt  = (n) => n==null||isNaN(n)?"—":Number(n).toLocaleString("en-IN",{minimumFractionDigits:2,maximumFractionDigits:2});
const DEF_NSE  = 3000;
const DEF_MCX  = [
  {script:"CRUDEOIL",lotQty:100,rate:40},{script:"GOLD",lotQty:1,rate:30},
  {script:"SILVER",lotQty:30,rate:25},{script:"COPPER",lotQty:2500,rate:20},
  {script:"NATURALGAS",lotQty:1250,rate:35},
];
const blank = () => ({id:uid(),trade_date:"",action:"BUY",qty:"",price:"",vol:"",script:"",type:"NORMAL",exchange:"NSE",is_settlement:false,sort_order:Date.now()});

// ── BROKERAGE ──
function makeMcxMap(scripts){ const m={}; (scripts||[]).forEach(s=>{m[s.script.toUpperCase()]=s;}); return m; }

function calcBrk(t, nseRate, mcxMap){
  if(t.type==="FORWARD") return 0;
  const vol=parseFloat(t.vol)||0, qty=parseFloat(t.qty)||0;
  const mcx=mcxMap[(t.script||"").toUpperCase()];
  if(mcx||t.exchange==="MCX"){const{lotQty=1,rate=40}=mcx||{};return(qty/lotQty)*rate;}
  return vol*((nseRate||DEF_NSE)/10_000_000);
}
function buildReport(tradesList, nseRate, mcxMap){
  const grp={};
  for(const t of tradesList){
    const k=(t.script||"UNKNOWN").toUpperCase();
    if(!grp[k])grp[k]={script:k,exchange:t.exchange,buys:[],sells:[]};
    t.action==="BUY"?grp[k].buys.push(t):grp[k].sells.push(t);
    grp[k].exchange=t.exchange;
  }
  return Object.values(grp).map(g=>{
    const buyVol=g.buys.reduce((s,t)=>s+(parseFloat(t.vol)||0),0);
    const sellVol=g.sells.reduce((s,t)=>s+(parseFloat(t.vol)||0),0);
    const buyBrk=g.buys.reduce((s,t)=>s+calcBrk(t,nseRate,mcxMap),0);
    const sellBrk=g.sells.reduce((s,t)=>s+calcBrk(t,nseRate,mcxMap),0);
    const totalBrk=buyBrk+sellBrk,gross=sellVol-buyVol,net=gross-totalBrk;
    return{...g,buyVol,sellVol,buyBrk,sellBrk,totalBrk,gross,net,noOf:g.buys.length+g.sells.length};
  });
}

// ── PDF BILL ──
function generateBillPDF(traderName, weekLabel, tradesList, trader, pdfTheme){

        </div>
      </div>
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead><tr style="background:${th}">

          <th style="padding:8px 10px;text-align:left;color:${tt};font-size:10px;text-transform:uppercase">Action</th>

          <th style="padding:8px 10px;text-align:left;color:${tt};font-size:10px;text-transform:uppercase">Price</th>

          <th style="padding:8px 10px;text-align:left;color:${tt};font-size:10px;text-transform:uppercase">Brokerage</th>
          <th style="padding:8px 10px;text-align:left;color:${tt};font-size:10px;text-transform:uppercase">Type</th>
        </tr></thead>
        <tbody>${gT.map(trRow).join("")}</tbody>
        <tfoot>
          <tr style="background:rgba(99,102,241,0.12)"><td colspan="4" style="padding:8px 10px;color:${txt};font-weight:700">Subtotal</td><td style="padding:8px 10px;font-weight:800">Buy:₹${fmt(g.buyVol)} | Sell:₹${fmt(g.sellVol)}</td><td style="padding:8px 10px;color:${gold};font-weight:800">₹${fmt(g.totalBrk)}</td><td></td></tr>
          <tr style="background:rgba(99,102,241,0.06)"><td colspan="5" style="padding:8px 10px;color:${sub};font-size:11px">Gross: <strong style="color:${txt}">₹${fmt(g.gross)}</strong></td><td colspan="2" style="padding:8px 10px;font-weight:800;font-size:14px;color:${g.net>=0?green:red}">Net: ₹${fmt(g.net)} ${g.net>=0?"▲":"▼"}</td></tr>
        </tfoot>

  }).join("");
  const sumRows=report.map((g,i)=>`<tr style="border-top:1px solid ${border};background:${i%2===0?"transparent":"rgba(255,255,255,0.02)"}">
    <td style="padding:10px 14px"><span style="background:${g.exchange==="MCX"?"rgba(234,179,8,0.15)":"rgba(59,130,246,0.15)"};color:${g.exchange==="MCX"?gold:"#3b82f6"};border-radius:5px;padding:3px 10px;font-size:11px;font-weight:700">${g.exchange}</span></td>

  const html=`<!DOCTYPE html><html><head><meta charset="utf-8"/><title>Bill — ${traderName}</title>
  <style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',Arial,sans-serif;background:${bg};padding:32px;color:${txt}}@media print{body{padding:0}}</style>
  </head><body><div style="max-width:1000px;margin:0 auto">
  <div style="background:linear-gradient(135deg,#1e3a8a,#2563eb);border-radius:14px;padding:28px 36px;text-align:center;margin-bottom:28px">
    <h1 style="color:white;font-size:26px;font-weight:800;margin-bottom:8px">Trade Bill</h1>
    <div style="color:#bfdbfe;font-size:16px;margin-bottom:4px">Trader: <strong style="color:white;font-size:18px">${traderName}</strong></div>
    <div style="display:inline-block;background:rgba(255,255,255,0.15);border-radius:8px;padding:5px 18px;margin:6px 0"><span style="color:#e0f2fe;font-size:13px;font-weight:600">📅 ${weekLabel}</span></div>
    <div style="color:#93c5fd;font-size:12px;margin-top:6px">Generated: ${new Date().toLocaleString("en-IN")} · NSE Rate: ₹${nseRate}/Cr</div>
  </div>

      <span style="color:#bfdbfe;font-size:12px">${tNoOf} trades total</span>

    <table style="width:100%;border-collapse:collapse;font-size:13px;background:${cardBg}">
      <thead><tr style="background:${th}">
        <th style="padding:10px 14px;text-align:left;color:${tt};font-size:11px;text-transform:uppercase">Exchange</th>
        <th style="padding:10px 14px;text-align:left;color:${tt};font-size:11px;text-transform:uppercase">Script</th>
        <th style="padding:10px 14px;text-align:center;color:${tt};font-size:11px;text-transform:uppercase">Trades</th>
        <th style="padding:10px 14px;text-align:left;color:${tt};font-size:11px;text-transform:uppercase">Total Gross</th>
        <th style="padding:10px 14px;text-align:left;color:${tt};font-size:11px;text-transform:uppercase">Total Brk</th>
        <th style="padding:10px 14px;text-align:left;color:${tt};font-size:11px;text-transform:uppercase">Net P&L</th>
      </tr></thead>
      <tbody>${sumRows}</tbody>
      <tfoot><tr style="background:#1e3a8a;border-top:2px solid #2563eb">
        <td colspan="2" style="padding:13px 14px;color:white;font-weight:800;font-size:14px">GRAND TOTAL</td>
        <td style="padding:13px 14px;text-align:center;color:#bfdbfe;font-weight:800">${tNoOf}</td>

        <td style="padding:13px 14px;font-weight:900;font-size:17px;color:${tNet>=0?"#4ade80":"#f87171"}">₹${fmt(tNet)}</td>
      </tr></tfoot>
    </table>
  </div>
  <div style="text-align:center;margin-top:18px;font-size:11px;color:${sub}">Trade System · ${new Date().toLocaleDateString("en-IN")}</div>
  </div></body></html>`;
  const blob=new Blob([html],{type:"text/html"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=`Bill_${traderName.replace(/\s+/g,"_")}_${weekLabel.replace(/[^a-zA-Z0-9]/g,"_")}.html`;
  a.click();URL.revokeObjectURL(url);
}

  const runSettlement=async()=>{
    if(!settlWeek){setSettlMsg("Select a week");return;}
    const missing=settlRates.find(r=>!r.rate||isNaN(parseFloat(r.rate)));
    if(missing){setSettlMsg("Enter settlement rate for: "+missing.script);return;}
    if(!confirm(`Settle week "${settlWeek.label}"?\nThis will create FORWARD settlement trades for all traders who have trades for these scripts.`))return;
    setSettlLoad(true);setSettlMsg("");
    try{
      // Save settlement rates to DB
      for(const r of settlRates){
        await sb.from("settlement_rates").upsert(
          {week_id:settlWeek.id,script:r.script.toUpperCase(),rate:parseFloat(r.rate),exchange:r.exchange||"NSE"},
          {onConflict:"week_id,script"}
        );
      }
      // Build a map of settlement rates
      const sRateMap={};
      settlRates.forEach(r=>{sRateMap[r.script.toUpperCase()]={rate:parseFloat(r.rate),exchange:r.exchange||"NSE"};});

      // Get all traders
      const{data:allT}=await sb.from("traders").select("*").eq("active",true);
      let settledCount=0;
      for(const trader of allT||[]){
        // Get NORMAL trades for this trader this week
        const{data:tt}=await sb.from("trades").select("*")
          .eq("trader_id",trader.id).eq("week_id",settlWeek.id).eq("type","NORMAL");
        if(!tt?.length)continue;

        // Calculate net position per script
        const netPos={};
        for(const t of tt){
          const s=t.script.toUpperCase();
          if(!sRateMap[s])continue; // only settle scripts we have rates for
          if(!netPos[s])netPos[s]={buyQty:0,sellQty:0,exchange:sRateMap[s].exchange,script:s};
          if(t.action==="BUY")netPos[s].buyQty+=parseFloat(t.qty)||0;
          else netPos[s].sellQty+=parseFloat(t.qty)||0;
        }

        // Remove old settlement trades for this trader+week
        await sb.from("trades").delete()
          .eq("trader_id",trader.id).eq("week_id",settlWeek.id).eq("is_settlement",true);

        // Create settlement FORWARD trades
        const st=[];
        for(const[script,pos]of Object.entries(netPos)){
          const sRate=sRateMap[script];
          if(!sRate)continue;
          const netQty=pos.buyQty-pos.sellQty;
          if(Math.abs(netQty)<0.001)continue; // already flat
          const action=netQty>0?"SELL":"BUY"; // close position
          const qty=Math.abs(netQty);
          const price=sRate.rate;
          const vol=qty*price;
          st.push({
            id:uid(),trader_id:trader.id,week_id:settlWeek.id,
            trade_date:"Settlement",action,qty,price,vol,
            script,type:"FORWARD",exchange:sRate.exchange,
            is_settlement:true,sort_order:999999
          });
        }
        if(st.length){await sb.from("trades").insert(st);settledCount++;}
      }
      // Mark week settled
      await sb.from("weeks").update({status:"settled"}).eq("id",settlWeek.id);
      await loadWeeks();
      setSettlMsg(`✅ Settled! ${settledCount} traders got settlement trades. Go to Bills tab to view & download.`);
      // Reload current trader trades if viewing this week
      if(selWeek?.id===settlWeek.id&&selTrader)await loadTrades(selTrader.id,settlWeek.id);
    }catch(e){setSettlMsg("❌ Error: "+e.message);}
    setSettlLoad(false);

          <div className="mo" style={{background:"#0f172a",border:"1px solid rgba(99,102,241,0.3)",borderRadius:16,width:"100%",maxWidth:1000,maxHeight:"90vh",display:"flex",flexDirection:"column"}}>
            <div style={{padding:"16px 22px",borderBottom:"1px solid rgba(255,255,255,0.07)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:16,fontWeight:800}}>✏️ Edit Bill — {editBill.trader.name}</div>
                <div style={{fontSize:12,color:"#64748b",marginTop:3}}>{editBill.weekLabel} · {editBill.trades.length} trades</div>
              </div>
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>generateBillPDF(editBill.trader.name,editBill.weekLabel,editBill.trades,editBill.trader,pdfTheme)} style={{...btn("#0369a1"),fontSize:12,padding:"8px 14px"}}>⬇ PDF</button>
                <button onClick={()=>setEB(null)} style={{background:"rgba(255,255,255,0.07)",border:"none",borderRadius:8,color:"#94a3b8",width:32,height:32,fontSize:16,cursor:"pointer"}}>✕</button>
              </div>
            </div>
            <div style={{overflowY:"auto",flex:1}}>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:700}}>
                  <thead><tr style={{background:"rgba(99,102,241,0.15)"}}>
                    {["Date","Action","Qty","Price","Vol","Script","Type","Exchange","Brk",""].map(h=>(
                      <th key={h} style={{padding:"9px 11px",textAlign:"left",color:"#a5b4fc",fontWeight:700,fontSize:11,textTransform:"uppercase",whiteSpace:"nowrap"}}>{h}</th>
                    ))}
                  </tr></thead>
                  <tbody>{editBill.trades.map((t,i)=>{
                    const ebNr=editBill.trader.nse_rate||DEF_NSE;
                    const ebMm=makeMcxMap(editBill.trader.mcx_scripts?.length?editBill.trader.mcx_scripts:DEF_MCX);
                    return(
                      <tr key={t.id||i} style={{borderTop:"1px solid rgba(255,255,255,0.04)",background:i%2===0?"transparent":"rgba(255,255,255,0.02)"}}>
                        <td style={{padding:"4px 6px"}}><input type="text" value={t.trade_date} onChange={e=>{const v=e.target.value;setEB(p=>{const ts=[...p.trades];ts[i]={...ts[i],trade_date:v};return{...p,trades:ts};});}} style={{...inp,fontSize:11,padding:"4px 6px"}}/></td>
                        <td style={{padding:"4px 6px"}}><select value={t.action} onChange={e=>{const v=e.target.value;setEB(p=>{const ts=[...p.trades];ts[i]={...ts[i],action:v};return{...p,trades:ts};});}} style={{...sl(t.action==="BUY"?"rgba(22,163,74,0.3)":"rgba(220,38,38,0.3)"),width:60,fontSize:11}}><option>BUY</option><option>SELL</option></select></td>
                        <td style={{padding:"4px 6px"}}><input type="number" value={t.qty} onChange={e=>{const v=e.target.value;setEB(p=>{const ts=[...p.trades];const q=parseFloat(v),pr=parseFloat(ts[i].price);ts[i]={...ts[i],qty:v,vol:!isNaN(q)&&!isNaN(pr)?(q*pr).toFixed(2):ts[i].vol};return{...p,trades:ts};});}} style={{...inp,fontSize:11,padding:"4px 6px",color:"#fde68a"}}/></td>
                        <td style={{padding:"4px 6px"}}><input type="number" step="0.01" value={t.price} onChange={e=>{const v=e.target.value;setEB(p=>{const ts=[...p.trades];const q=parseFloat(ts[i].qty),pr=parseFloat(v);ts[i]={...ts[i],price:v,vol:!isNaN(q)&&!isNaN(pr)?(q*pr).toFixed(2):ts[i].vol};return{...p,trades:ts};});}} style={{...inp,fontSize:11,padding:"4px 6px",color:"#fde68a"}}/></td>
                        <td style={{padding:"4px 6px",color:"#a5b4fc",fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>₹{fmt(parseFloat(t.vol))}</td>
                        <td style={{padding:"4px 6px"}}><input type="text" value={t.script} onChange={e=>{const v=e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,"");setEB(p=>{const ts=[...p.trades];ts[i]={...ts[i],script:v};return{...p,trades:ts};});}} style={{...inp,fontSize:11,padding:"4px 6px",color:"#fbbf24",fontWeight:700}}/></td>
                        <td style={{padding:"4px 6px"}}><select value={t.type} onChange={e=>{const v=e.target.value;setEB(p=>{const ts=[...p.trades];ts[i]={...ts[i],type:v};return{...p,trades:ts};});}} style={{...sl(t.type==="FORWARD"?"rgba(168,85,247,0.25)":"rgba(255,255,255,0.06)"),width:80,fontSize:11}}><option>NORMAL</option><option>FORWARD</option></select></td>
                        <td style={{padding:"4px 6px"}}><select value={t.exchange} onChange={e=>{const v=e.target.value;setEB(p=>{const ts=[...p.trades];ts[i]={...ts[i],exchange:v};return{...p,trades:ts};});}} style={{...sl(t.exchange==="MCX"?"rgba(234,179,8,0.25)":"rgba(59,130,246,0.25)"),width:60,fontSize:11}}><option>NSE</option><option>MCX</option></select></td>
                        <td style={{padding:"4px 6px",color:"#fbbf24",fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>₹{fmt(calcBrk(t,ebNr,ebMm))}</td>
                        <td style={{padding:"4px 6px"}}><button onClick={()=>setEB(p=>({...p,trades:p.trades.filter((_,idx)=>idx!==i)}))} style={{...btn("rgba(220,38,38,0.1)","#f87171"),border:"1px solid rgba(220,38,38,0.2)",width:24,height:24,padding:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11}}>✕</button></td>
                      </tr>
                    );
                  })}</tbody>
                </table>
              </div>
            </div>
            {(()=>{
              const ebNr=editBill.trader.nse_rate||DEF_NSE;
              const ebMm=makeMcxMap(editBill.trader.mcx_scripts?.length?editBill.trader.mcx_scripts:DEF_MCX);
              const r=buildReport(editBill.trades,ebNr,ebMm);
              const g=r.reduce((s,x)=>s+x.gross,0),b=r.reduce((s,x)=>s+x.totalBrk,0),n=r.reduce((s,x)=>s+x.net,0);
              return(
                <div style={{padding:"12px 22px",borderTop:"1px solid rgba(255,255,255,0.07)",display:"flex",gap:16,alignItems:"center",flexWrap:"wrap",background:"rgba(0,0,0,0.2)"}}>
                  <button onClick={()=>setEB(p=>({...p,trades:[...p.trades,{...blank(),trader_id:editBill.trader.id}]}))} style={{...btn("rgba(99,102,241,0.15)","#a5b4fc"),border:"1px solid rgba(99,102,241,0.25)",fontSize:12}}>+ Row</button>
                  <span style={{color:"#94a3b8",fontSize:13}}>Gross: <strong style={{color:"#e2e8f0"}}>₹{fmt(g)}</strong></span>
                  <span style={{color:"#94a3b8",fontSize:13}}>Brk: <strong style={{color:"#fbbf24"}}>₹{fmt(b)}</strong></span>
                  <strong style={{fontSize:15,color:n>=0?"#4ade80":"#f87171"}}>Net: ₹{fmt(n)} {n>=0?"▲":"▼"}</strong>
                  <div style={{marginLeft:"auto"}}>
                    <button onClick={async()=>{
                      await sb.from("trades").delete().eq("trader_id",editBill.trader.id).eq("week_id",billsWeek.id);
                      const ins=editBill.trades.map(t=>({id:t.id||uid(),trader_id:editBill.trader.id,week_id:billsWeek.id,trade_date:t.trade_date||"",action:t.action||"BUY",qty:parseFloat(t.qty)||0,price:parseFloat(t.price)||0,vol:parseFloat(t.vol)||0,script:(t.script||"").toUpperCase(),type:t.type||"NORMAL",exchange:t.exchange||"NSE",is_settlement:t.is_settlement||false,sort_order:t.sort_order||0}));
                      if(ins.length)await sb.from("trades").insert(ins);
                      await loadBills(billsWeek);setEB(null);
                    }} style={{...btn("linear-gradient(135deg,#059669,#047857)"),fontSize:13}}>💾 Save Changes</button>
                  </div>
                </div>
              );
            })()}
          </div>
        </div>
      )}

      {/* ════════ EXCEL PREVIEW MODAL ════════ */}
      {showXP&&xlPrev&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999,padding:16}} onClick={e=>e.target===e.currentTarget&&setShXP(false)}>
          <div className="mo" style={{background:"#0f172a",border:"1px solid rgba(99,102,241,0.3)",borderRadius:16,width:"100%",maxWidth:940,maxHeight:"88vh",display:"flex",flexDirection:"column"}}>
            <div style={{padding:"16px 22px",borderBottom:"1px solid rgba(255,255,255,0.07)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:16,fontWeight:800}}>📤 Excel Import Preview</div>
                <div style={{fontSize:12,color:"#64748b",marginTop:3}}>{xlPrev.length} rows found · will append below existing trades</div>
              </div>
              <button onClick={()=>setShXP(false)} style={{background:"rgba(255,255,255,0.07)",border:"none",borderRadius:8,color:"#94a3b8",width:32,height:32,fontSize:16,cursor:"pointer"}}>✕</button>
            </div>
            <div style={{overflowY:"auto",padding:"14px 18px",flex:1}}>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:600}}>
                  <thead><tr style={{background:"rgba(99,102,241,0.15)"}}>{["#","Date","Action","Qty","Price","Vol","Script","Type","Exchange"].map(h=><th key={h} style={{padding:"9px 11px",textAlign:"left",color:"#a5b4fc",fontWeight:700,fontSize:11,textTransform:"uppercase"}}>{h}</th>)}</tr></thead>
                  <tbody>{xlPrev.map((r,i)=>(
                    <tr key={i} style={{borderTop:"1px solid rgba(255,255,255,0.04)",background:i%2===0?"transparent":"rgba(255,255,255,0.02)"}}>
                      <td style={{padding:"8px 11px",color:"#475569"}}>{i+1}</td>
                      <td style={{padding:"8px 11px",color:"#cbd5e1"}}>{r.trade_date}</td>
                      <td style={{padding:"8px 11px"}}><span style={{background:r.action==="BUY"?"rgba(22,163,74,0.2)":"rgba(220,38,38,0.2)",color:r.action==="BUY"?"#4ade80":"#f87171",borderRadius:4,padding:"2px 8px",fontWeight:700,fontSize:11}}>{r.action}</span></td>
                      <td style={{padding:"8px 11px",color:"#fde68a"}}>{r.qty}</td>
                      <td style={{padding:"8px 11px",color:"#fde68a"}}>{r.price}</td>
                      <td style={{padding:"8px 11px",color:"#a5b4fc"}}>{r.vol?`₹${Number(r.vol).toLocaleString("en-IN")}`:"—"}</td>
                      <td style={{padding:"8px 11px",color:"#fbbf24",fontWeight:700}}>{r.script}</td>
                      <td style={{padding:"8px 11px"}}><span style={{background:r.type==="FORWARD"?"rgba(168,85,247,0.15)":"rgba(99,102,241,0.1)",color:r.type==="FORWARD"?"#c084fc":"#a5b4fc",borderRadius:4,padding:"2px 7px",fontSize:10,fontWeight:700}}>{r.type}</span></td>
                      <td style={{padding:"8px 11px",color:r.exchange==="MCX"?"#fbbf24":"#60a5fa",fontWeight:700}}>{r.exchange}</td>
                    </tr>
                  ))}</tbody>
                </table>
              </div>
            </div>
            <div style={{padding:"14px 22px",borderTop:"1px solid rgba(255,255,255,0.07)",display:"flex",gap:10,justifyContent:"flex-end",flexWrap:"wrap"}}>
              <button onClick={()=>setShXP(false)} style={{...btn("rgba(255,255,255,0.06)","#94a3b8"),border:"1px solid rgba(255,255,255,0.1)"}}>Cancel</button>
              {/* SAVE BUTTON in Excel Import */}
              <button onClick={()=>confirmImport(true)} style={{...btn("rgba(22,163,74,0.2)","#4ade80"),border:"1px solid rgba(22,163,74,0.4)",fontSize:13,padding:"10px 20px",display:"flex",alignItems:"center",gap:6}}>
                💾 Import + Save ({xlPrev.length} rows)
              </button>
              <button onClick={()=>confirmImport(false)} style={{...btn("linear-gradient(135deg,#059669,#047857)"),padding:"10px 22px"}}>
                ✓ Import Only
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ════════ PASSWORD MODALS ════════ */}
      {showCPwd&&cpTarget&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999,padding:16}} onClick={e=>e.target===e.currentTarget&&setSCP(false)}>
          <div className="mo" style={{background:"#0f172a",border:"1px solid rgba(99,102,241,0.3)",borderRadius:16,width:"100%",maxWidth:400,padding:32}}>
            <div style={{fontSize:16,fontWeight:800,marginBottom:4}}>🔑 Change Password</div>
            <div style={{fontSize:13,color:"#64748b",marginBottom:24}}>For: <strong style={{color:"#a5b4fc"}}>@{cpTarget.username}</strong></div>
            {[{l:"New Password",v:newPwd,s:setNP,ph:"New password"},{l:"Confirm",v:confirmPwd,s:setCnfP,ph:"Confirm"}].map(({l,v,s,ph})=>(
              <div key={l} style={{marginBottom:14}}><label style={{fontSize:11,color:"#94a3b8",display:"block",marginBottom:5,fontWeight:600,textTransform:"uppercase"}}>{l}</label><input type="password" placeholder={ph} value={v} onChange={e=>s(e.target.value)} style={inpLg}/></div>
            ))}
            {pwdErr&&<div style={{color:"#f87171",fontSize:12,marginBottom:12,padding:"8px 12px",background:"rgba(220,38,38,0.08)",borderRadius:6}}>⚠ {pwdErr}</div>}
            {pwdOk&&<div style={{color:"#4ade80",fontSize:12,marginBottom:12,padding:"8px 12px",background:"rgba(22,163,74,0.08)",borderRadius:6}}>✓ {pwdOk}</div>}
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setSCP(false)} style={{flex:1,...btn("rgba(255,255,255,0.06)","#94a3b8"),border:"1px solid rgba(255,255,255,0.1)"}}>Cancel</button>
              <button onClick={subCP} style={{flex:1,...btn("linear-gradient(135deg,#4f46e5,#7c3aed)"),padding:"11px"}}>Save</button>
            </div>
          </div>
        </div>
      )}
      {showSP&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999,padding:16}} onClick={e=>e.target===e.currentTarget&&setShSP(false)}>
          <div className="mo" style={{background:"#0f172a",border:"1px solid rgba(99,102,241,0.3)",borderRadius:16,width:"100%",maxWidth:400,padding:32}}>
            <div style={{fontSize:16,fontWeight:800,marginBottom:24}}>🔑 Change My Password</div>
            {[{l:"Current",v:spOld,s:setSPO,ph:"Current password"},{l:"New Password",v:spNew,s:setSPN,ph:"New password"},{l:"Confirm New",v:spCnf,s:setSPC,ph:"Confirm"}].map(({l,v,s,ph})=>(
              <div key={l} style={{marginBottom:14}}><label style={{fontSize:11,color:"#94a3b8",display:"block",marginBottom:5,fontWeight:600,textTransform:"uppercase"}}>{l}</label><input type="password" placeholder={ph} value={v} onChange={e=>s(e.target.value)} style={inpLg}/></div>
            ))}
            {spErr&&<div style={{color:"#f87171",fontSize:12,marginBottom:12,padding:"8px 12px",background:"rgba(220,38,38,0.08)",borderRadius:6}}>⚠ {spErr}</div>}
            {spOk&&<div style={{color:"#4ade80",fontSize:12,marginBottom:12,padding:"8px 12px",background:"rgba(22,163,74,0.08)",borderRadius:6}}>✓ {spOk}</div>}
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setShSP(false)} style={{flex:1,...btn("rgba(255,255,255,0.06)","#94a3b8"),border:"1px solid rgba(255,255,255,0.1)"}}>Cancel</button>
              <button onClick={subSP} style={{flex:1,...btn("linear-gradient(135deg,#4f46e5,#7c3aed)"),padding:"11px"}}>Save</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
